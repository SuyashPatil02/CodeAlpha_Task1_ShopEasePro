<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us — ShopEase Pro</title>
  <meta name="description" content="Get in touch with the ShopEase Pro team. We're here to help." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="header"></div>

  <main class="container page">
    <h1 class="page-title">Contact Us</h1>
    <p class="page-sub">Have a question? We'd love to hear from you.</p>

    <div class="cart-layout">
      <div class="prose">
        <h2>Get in touch</h2>
        <p>📍 123 Market Street, Commerce City, 10001</p>
        <p>📞 +1 (555) 123-4567</p>
        <p>✉️ support@shopeasepro.com</p>
        <p>🕘 Mon–Sat, 9:00 AM – 7:00 PM</p>
      </div>
      <aside class="summary">
        <h3 style="margin-bottom:16px">Send a Message</h3>
        <form id="contactForm">
          <div class="form-group"><label>Name</label><input type="text" id="cName" required /></div>
          <div class="form-group"><label>Email</label><input type="email" id="cEmail" required /></div>
          <div class="form-group"><label>Message</label><textarea id="cMsg" rows="4" required></textarea></div>
          <button type="submit" class="btn btn-block">Send Message</button>
        </form>
      </aside>
    </div>
  </main>

  <div id="footer"></div>

  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("contactForm").addEventListener("submit", (e) => {
        e.preventDefault();
        toast("Thanks! We'll get back to you soon.");
        e.target.reset();
      });
    });
  </script>
</body>
</html>
