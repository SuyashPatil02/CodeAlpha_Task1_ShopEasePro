<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — ShopEase Pro</title>
  <meta name="description" content="Create a new ShopEase Pro account." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="header"></div>

  <main class="container page">
    <div class="form-card">
      <h1 class="page-title center">Create Account</h1>
      <p class="page-sub center">Join ShopEase Pro to start shopping</p>
      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" required placeholder="Jane Doe" />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required minlength="6" placeholder="At least 6 characters" />
        </div>
        <button type="submit" class="btn btn-block">Register</button>
      </form>
      <p class="form-foot">Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </main>

  <div id="footer"></div>

  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
