<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ShopEase Pro</title>
  <meta name="description" content="Log in to your ShopEase Pro account." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="header"></div>

  <main class="container page">
    <div class="form-card">
      <h1 class="page-title center">Welcome Back</h1>
      <p class="page-sub center">Log in to continue shopping</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Your password" />
        </div>
        <button type="submit" class="btn btn-block">Login</button>
      </form>
      <div class="demo-note">
        <strong>Demo accounts</strong><br/>
        Admin: admin@shopeasepro.com / admin123<br/>
        User: user@shopeasepro.com / user123
      </div>
      <p class="form-foot">No account? <a href="register.html">Register here</a></p>
    </div>
  </main>

  <div id="footer"></div>

  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
