<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard — ShopEase Pro</title>
  <meta name="description" content="Your ShopEase Pro dashboard: orders, profile and wishlist." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="header"></div>

  <main class="container page">
    <h1 class="page-title" id="greeting">My Dashboard</h1>
    <p class="page-sub">Manage your orders and profile.</p>

    <div class="stat-grid">
      <div class="stat-card"><div class="val" id="statOrders">0</div><div class="lbl">Orders</div></div>
      <div class="stat-card"><div class="val" id="statSpent">$0.00</div><div class="lbl">Total Spent</div></div>
      <div class="stat-card"><div class="val" id="statWishlist">0</div><div class="lbl">Wishlist Items</div></div>
    </div>

    <div class="cart-layout">
      <div>
        <h2 class="page-title" style="font-size:1.3rem">Recent Orders</h2>
        <div id="recentOrders" style="margin-top:14px"></div>
      </div>
      <aside class="summary">
        <h3 style="margin-bottom:16px">Profile Settings</h3>
        <form id="profileForm">
          <div class="form-group"><label>Name</label><input type="text" id="profName" required /></div>
          <div class="form-group"><label>Email</label><input type="email" id="profEmail" disabled /></div>
          <div class="form-group"><label>Phone</label><input type="text" id="profPhone" placeholder="Optional" /></div>
          <div class="form-group"><label>New Password</label><input type="password" id="profPassword" placeholder="Leave blank to keep" /></div>
          <button type="submit" class="btn btn-block">Save Changes</button>
        </form>
        <button class="btn btn-outline btn-block" id="logoutBtn" style="margin-top:10px">Logout</button>
      </aside>
    </div>
  </main>

  <div id="footer"></div>

  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
